name: Update Policy Definitions

on:
  schedule:
    - cron: "0 2 * * 0"  # Every Sunday at 02:00 UTC
  workflow_dispatch:       # Manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # needed to push the updated JSON files

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/update-policies/package.json

      - name: Install script dependencies
        run: npm install
        working-directory: scripts/update-policies

      - name: Check API keys are set
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ] && [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "ERROR: Neither ANTHROPIC_API_KEY nor GEMINI_API_KEY secret is set."
            echo "Add one of them in: Settings → Secrets and variables → Actions → Repository secrets"
            exit 1
          fi
          [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ] && echo "✓ ANTHROPIC_API_KEY is set" || echo "- ANTHROPIC_API_KEY not set"
          [ -n "${{ secrets.GEMINI_API_KEY }}" ] && echo "✓ GEMINI_API_KEY is set" || echo "- GEMINI_API_KEY not set"

      - name: Fetch official pages and update policies
        run: npx tsx index.ts
        working-directory: scripts/update-policies
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          POLICIES_DIR: ${{ github.workspace }}/mcp-server/policies

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet mcp-server/policies/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Policy files are already up to date."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Policy files have been updated:"
            git diff --stat mcp-server/policies/
          fi

      - name: Commit and push updated policies
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mcp-server/policies/android.json mcp-server/policies/ios.json
          git commit -m "chore: update policy definitions from official sources [$(date +%Y-%m-%d)]"
          git push
